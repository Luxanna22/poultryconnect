{% extends "auth_base.html" %}

{% block title %}Sign In — PoultryConnect{% endblock %}

{% block form_content %}

<h2 class="auth-form-title">Welcome back</h2>
<p class="auth-form-subtitle">
    Don't have an account?
    <a href="{{ url_for('auth.register') }}">Create one here</a>
</p>

<form method="POST" action="{{ url_for('auth.login') }}" novalidate>

    <div class="form-group">
        <label for="username">Username</label>
        <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            value="{{ request.form.get('username', '') }}"
            autocomplete="username"
            required
        >
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
        >
    </div>

    <div class="remember-row" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Keep me signed in</label>
        </div>
        <a href="{{ url_for('auth.reset_password_request') }}" style="font-size: 0.9rem; color: var(--primary-color, #2b6cb0); text-decoration: none;">Forgot Password?</a>
    </div>

    <button type="submit" class="btn-auth">Sign In to PoultryConnect</button>

</form>

{% endblock %}
