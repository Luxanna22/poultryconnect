{% extends "auth_base.html" %}

{% block title %}Reset Password — PoultryConnect{% endblock %}

{% block form_content %}

<h2 class="auth-form-title">Reset Password</h2>
<p class="auth-form-subtitle">
    Enter your email address and we will send you a link to reset your password.
</p>

<form method="POST" action="{{ url_for('auth.reset_password_request') }}" novalidate>

    <div class="form-group">
        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email address"
            required
        >
    </div>

    <button type="submit" class="btn-auth">Request Password Reset</button>

</form>

<p class="auth-form-subtitle" style="margin-top: 1rem;">
    <a href="{{ url_for('auth.login') }}">Back to Login</a>
</p>

{% endblock %}
